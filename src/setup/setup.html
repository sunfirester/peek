<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:" />
  <link rel="stylesheet" href="setup.css" />
  <title>Peek Setup</title>
</head>
<body>
  <div id="app">
    <header>
      <h1>Peek</h1>
      <p>Connect to your Frigate instance to get started.</p>
    </header>

    <section>
      <div class="row">
        <label for="frigateHost">Frigate host</label>
        <input id="frigateHost" type="text" placeholder="192.168.1.10" autofocus />
      </div>
      <div class="row split">
        <div>
          <label for="frigatePort">Frigate port</label>
          <input id="frigatePort" type="text" placeholder="5000" />
        </div>
        <div>
          <label for="corner">Corner</label>
          <select id="corner">
            <option value="top-right">Top right</option>
            <option value="top-left">Top left</option>
            <option value="bottom-right">Bottom right</option>
            <option value="bottom-left">Bottom left</option>
          </select>
        </div>
      </div>
      <div class="row split">
        <div>
          <label for="frigateUser">Frigate username</label>
          <input id="frigateUser" type="text" placeholder="optional" autocomplete="off" />
        </div>
        <div>
          <label for="frigatePass">Frigate password</label>
          <input id="frigatePass" type="password" placeholder="optional" autocomplete="off" />
        </div>
      </div>
      <p class="hint">Fill these only if your Frigate requires login (authenticated port, usually 8971). Leave empty for the open port 5000.</p>
    </section>

    <section>
      <h2>MQTT broker</h2>
      <div class="row split">
        <div>
          <label for="mqttHost">Host</label>
          <input id="mqttHost" type="text" placeholder="same as Frigate host" />
        </div>
        <div>
          <label for="mqttPort">Port</label>
          <input id="mqttPort" type="text" placeholder="1883" />
        </div>
      </div>
      <div class="row split">
        <div>
          <label for="mqttUser">Username</label>
          <input id="mqttUser" type="text" placeholder="optional" autocomplete="off" />
        </div>
        <div>
          <label for="mqttPass">Password</label>
          <input id="mqttPass" type="password" placeholder="optional" autocomplete="off" />
        </div>
      </div>
    </section>

    <section id="runtime" class="hidden">
      <h2>Notifications</h2>
      <div class="row">
        <label>Cameras</label>
        <div id="cameraList" class="camera-list"></div>
      </div>
      <label class="check">
        <input id="sound" type="checkbox" />
        <span class="check-text">Play sound on detection</span>
      </label>
      <label class="check">
        <input id="snapshot" type="checkbox" />
        <span class="check-text">Show an instant snapshot while the stream connects</span>
      </label>
      <label class="check">
        <input id="cropToObject" type="checkbox" />
        <span class="check-text">Crop to detected object</span>
        <span class="info" tabindex="0">i<span class="tip">Dynamically zooms and pans the overlay to fit the bounding box of the detected object.</span></span>
      </label>
      <div class="row" id="cropRatioRow">
        <label for="cropRatio">Crop Aspect Ratio</label>
        <select id="cropRatio">
          <option value="16:9">16:9</option>
          <option value="4:3">4:3</option>
          <option value="1:1">1:1</option>
        </select>
      </div>
      <label class="check">
        <input id="showAllObjectsInFrame" type="checkbox" />
        <span class="check-text">Show all objects in frame (e.g. person + car + cat)</span>
      </label>
      <label class="check">
        <input id="showBoundingBoxes" type="checkbox" />
        <span class="check-text">Show bounding boxes on video</span>
      </label>
      <label class="check">
        <input id="highResStream" type="checkbox" />
        <span class="check-text">Prefer high-res stream</span>
        <span class="info" tabindex="0">i<span class="tip">Bypasses Frigate's sub-stream mapping and attempts to request the main camera stream for maximum quality.</span></span>
      </label>
      <div class="row">
        <label for="dismiss">Dismiss after</label>
        <select id="dismiss">
          <option value="3">3 seconds</option>
          <option value="5">5 seconds</option>
          <option value="8">8 seconds</option>
          <option value="15">15 seconds</option>
          <option value="30">30 seconds</option>
          <option value="0">Until dismissed</option>
        </select>
      </div>
      <div class="row">
        <label for="clickAction">Click notification to</label>
        <select id="clickAction">
          <option value="event">Open event details</option>
          <option value="live">Open live stream</option>
          <option value="disabled">Do nothing</option>
        </select>
      </div>
    </section>

    <section>
      <h2>Updates</h2>
      <label class="check">
        <input id="autoUpdate" type="checkbox" />
        <span class="check-text">Check for updates on launch and notify me</span>
        <span class="info" tabindex="0">i<span class="tip">When enabled, Peek connects to GitHub over the internet to check for a new version. Leave this off to keep Peek fully local, with no external connection. You can still check manually anytime from the menu.</span></span>
      </label>
      <div class="row">
        <label for="updateRepo">Update Repository</label>
        <input id="updateRepo" type="text" placeholder="casi-3/peek" />
      </div>
      <label class="check" id="startupRow">
        <input id="openAtLogin" type="checkbox" />
        <span class="check-text">Open on startup</span>
        <span class="info" tabindex="0">i<span class="tip">Start Peek automatically when your computer starts. Peek runs in the background and only shows the overlay when Frigate detects something.</span></span>
      </label>
      <label class="check" id="dockRow">
        <input id="showDock" type="checkbox" />
        <span class="check-text">Keep an icon in the Dock</span>
        <span class="info" tabindex="0">i<span class="tip">By default Peek lives only in the menu bar. On Macs with a notch the menu bar icon can be hidden behind it; enable this to keep a Dock icon so Settings stays reachable. You can always reopen Settings by launching Peek again from Spotlight.</span></span>
      </label>
    </section>

    <div id="status" class="hidden"></div>

    <footer>
      <button id="test" class="ghost">Test connection</button>
      <div class="spacer"></div>
      <button id="cancel" class="ghost">Cancel</button>
      <button id="save" class="primary">Save &amp; start</button>
    </footer>
  </div>
  <script src="setup.js"></script>
</body>
</html>
